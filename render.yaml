services:
  - type: web
    name: hall-booking-system
    env: node
    buildCommand: npm install && npm run build && cd backend && npm install
    startCommand: cd backend && node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        value: "gateway01.ap-southeast-1.prod.aws.tidbcloud.com"
      - key: DB_USER
        value: "3L5XjoEyrEmS4PU.root"
      - key: DB_PASSWORD
        value: "gAQ3i0GTAdgXWu5K"
      - key: DB_NAME
        value: "hall_booking"
      - key: DB_PORT
        value: "4000"
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://hall-booking-system-6.onrender.com"
